<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoFlow BLE Debug</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --text: #e0e0e0;
  --text-muted: #888;
  --accent: #e94560;
  --tx-color: #4da6ff;
  --rx-color: #4dff88;
  --border: #2a2a4a;
  --mono: 'Consolas', 'Monaco', 'Courier New', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
header h1 { font-size: 18px; color: var(--accent); }
#status {
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: bold;
  background: #333;
  color: #888;
}
#status.connected { background: #1a3a1a; color: var(--rx-color); }
#status.connecting { background: #3a3a1a; color: #ffcc00; }
#status.error { background: #3a1a1a; color: var(--accent); }

#connection-panel {
  display: flex;
  gap: 10px;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  align-items: center;
}
#connection-panel input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 13px;
}
#connection-panel input::placeholder { color: var(--text-muted); }
#connection-panel button {
  padding: 6px 16px;
  border: none;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 13px;
  cursor: pointer;
  background: var(--surface2);
  color: var(--text);
  transition: background 0.2s;
}
#connection-panel button:hover { background: var(--accent); }
#connection-panel button:disabled { opacity: 0.4; cursor: default; background: var(--surface2); }
#connection-panel .hint {
  border-color: var(--accent);
  box-shadow: 0 0 6px rgba(233, 69, 96, 0.5);
  animation: hint-pulse 1.5s ease-in-out 3;
}

#log-area {
  padding: 8px 20px;
  background: #111;
  height: 120px;
  min-height: 0;
  overflow: hidden;
  font-size: 11px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}
#log-area div { padding: 1px 0; }
#log-area .log-error { color: var(--accent); }
#log-area .log-success { color: var(--rx-color); }
#log-area .log-info { color: var(--tx-color); }

#main-content {
  display: flex;
  flex: 1;
  overflow: hidden;
}
#packet-log {
  flex: 1;
  overflow: auto;
  min-width: 0;
}
#packet-log table {
  border-collapse: collapse;
  font-size: 13px;
  width: max-content;
  min-width: 100%;
}
#packet-log thead th {
  position: sticky;
  top: 0;
  background: var(--surface);
  padding: 5px 8px;
  text-align: left;
  border-bottom: 2px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  cursor: grab;
  text-overflow: ellipsis;
  position: relative;
}
#packet-log thead th .col-resize {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 5px;
  cursor: col-resize;
}
#packet-log thead th .col-resize:hover,
#packet-log thead th .col-resize.dragging {
  background: var(--accent);
}
#packet-log tbody tr {
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}
#packet-log tbody tr:hover { background: var(--surface2); }
#packet-log tbody tr.selected { background: var(--surface2); }
#packet-log tbody td {
  padding: 4px 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dir-tx { color: var(--tx-color); font-weight: bold; }
.dir-rx { color: var(--rx-color); font-weight: bold; }

.resize-handle-h {
  width: 5px;
  cursor: col-resize;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.15s;
}
.resize-handle-h:hover, .resize-handle-h.dragging { background: var(--accent); }

.resize-handle-v {
  height: 5px;
  cursor: row-resize;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.15s;
}
.resize-handle-v:hover, .resize-handle-v.dragging { background: var(--accent); }

#payload-detail {
  width: 55%;
  min-width: 0;
  display: flex;
  flex-direction: column;
}
#payload-detail h3 {
  padding: 8px 12px;
  background: var(--surface);
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
#payload-detail h3 button {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 8px;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  background: var(--surface2);
  color: var(--text-muted);
  margin-left: auto;
}
#payload-detail h3 button + button { margin-left: 0; }
#payload-detail h3 button:hover { background: var(--accent); color: var(--text); }
#proto-bar {
  display: flex;
  gap: 6px;
  padding: 6px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  align-items: center;
  flex-wrap: wrap;
  font-size: 11px;
}
#proto-bar select, #proto-bar button {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 3px 8px;
  border-radius: 3px;
  transition: border-color 0.3s, box-shadow 0.3s;
}
#proto-bar select.hint {
  border-color: var(--accent);
  box-shadow: 0 0 6px rgba(233, 69, 96, 0.5);
  animation: hint-pulse 1.5s ease-in-out 3;
  font-family: var(--mono);
  font-size: 11px;
}
#proto-bar button { cursor: pointer; border: none; background: var(--surface2); }
#proto-bar button:hover { background: var(--accent); }
#proto-bar label { color: var(--text-muted); }
#proto-decoded {
  overflow: auto;
  padding: 8px 12px;
  font-size: 12px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
  border-bottom: 1px solid var(--border);
  max-height: 50%;
  color: var(--text);
}
#proto-decoded:empty { display: none; }
#proto-decoded .proto-msg-link {
  color: var(--tx-color);
  font-weight: bold;
  cursor: pointer;
  text-decoration: underline;
  text-decoration-style: dotted;
}
#proto-decoded .proto-msg-link:hover { color: var(--accent); }
#proto-decoded .proto-key { color: var(--tx-color); }
#proto-decoded .proto-val { color: var(--rx-color); }
#proto-decoded .proto-err { color: var(--accent); }
#custom-proto-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#custom-proto-overlay.visible { display: flex; }
#custom-proto-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  width: 600px;
  max-width: 90vw;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
}
#custom-proto-modal h2 {
  font-size: 14px;
  margin-bottom: 12px;
  color: var(--accent);
}
#custom-proto-modal textarea {
  flex: 1;
  min-height: 300px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 12px;
  resize: vertical;
}
#custom-proto-modal .btn-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
#custom-proto-modal button {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 13px;
  cursor: pointer;
  background: var(--surface2);
  color: var(--text);
}
#custom-proto-modal button:hover { background: var(--accent); }
#custom-proto-modal button.primary { background: var(--accent); }
#custom-proto-error { color: var(--accent); font-size: 11px; margin-top: 8px; min-height: 14px; }

/* Payload view tabs */
#payload-tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
#payload-tabs button {
  padding: 6px 14px;
  border: none;
  background: none;
  color: var(--text-muted);
  font-family: var(--mono);
  font-size: 12px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
}
#payload-tabs button:hover { color: var(--text); }
#payload-tabs button.active { color: var(--accent); border-bottom-color: var(--accent); }
#payload-tabs button.hint {
  color: var(--accent);
  animation: hint-pulse 1.5s ease-in-out 3;
}

#view-packet, #view-timeline { display: none; flex-direction: column; flex: 1; overflow: hidden; }
#view-packet.active, #view-timeline.active { display: flex; }

/* Timeline view */
#timeline-controls {
  display: flex;
  gap: 8px;
  padding: 6px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  align-items: center;
  font-size: 11px;
  flex-wrap: wrap;
}
#timeline-controls button, #timeline-controls select {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 3px 8px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 11px;
}
#timeline-controls button { cursor: pointer; border: none; background: var(--surface2); }
#timeline-controls button:hover { background: var(--accent); }
#timeline-controls label { color: var(--text-muted); }
#timeline-controls input[type="checkbox"] { margin-right: 3px; }
#timeline-wrap {
  flex: 1;
  overflow: auto;
}
#timeline-wrap table {
  border-collapse: collapse;
  font-size: 12px;
  width: max-content;
  min-width: 100%;
}
#timeline-wrap thead th {
  position: sticky;
  top: 0;
  background: var(--surface);
  padding: 4px 8px;
  text-align: left;
  border-bottom: 2px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  position: relative;
  cursor: pointer;
}
#timeline-wrap thead th:hover { color: var(--text); }
#timeline-wrap thead th .col-resize {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 5px;
  cursor: col-resize;
}
#timeline-wrap thead th .col-resize:hover,
#timeline-wrap thead th .col-resize.dragging {
  background: var(--accent);
}
#timeline-wrap tbody td {
  padding: 3px 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-bottom: 1px solid var(--border);
}
#timeline-wrap tbody td.changed {
  background: #2a2a00;
  color: #ffcc00;
  font-weight: bold;
}
#timeline-wrap tbody tr:hover { background: var(--surface2); }
#timeline-wrap tbody tr.selected { background: var(--surface2); }
#tl-field-bar {
  padding: 6px 12px;
  background: var(--surface);
  font-size: 11px;
  display: flex;
  align-items: flex-start;
  gap: 6px;
  flex-wrap: wrap;
  min-height: 0;
  height: 80px;
  overflow: hidden;
}
#tl-field-bar .tl-field-label { color: var(--text-muted); flex-shrink: 0; }
#tl-field-bar button {
  padding: 2px 8px;
  border: none;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  background: var(--surface2);
  color: var(--text-muted);
  flex-shrink: 0;
}
#tl-field-bar button:hover { background: var(--accent); color: var(--text); }
#tl-field-bar input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 2px 8px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 11px;
  width: 140px;
  flex-shrink: 0;
}
#tl-field-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  flex: 1;
}
.tl-chip {
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  cursor: pointer;
  background: var(--bg);
  color: var(--text-muted);
  border: 1px solid var(--border);
  user-select: none;
  white-space: nowrap;
}
.tl-chip.pinned {
  background: var(--surface2);
  color: var(--rx-color);
  border-color: var(--rx-color);
}
.tl-chip.has-changes { font-style: italic; }
#timeline-empty {
  padding: 20px;
  color: var(--text-muted);
  text-align: center;
  font-size: 12px;
}
#hex-dump {
  flex: 1;
  overflow: auto;
  padding: 8px 12px;
  font-size: 12px;
  line-height: 1.6;
  white-space: pre;
  color: var(--text-muted);
}
.hex-offset { color: var(--text-muted); }
.hex-byte { color: var(--text); }
.hex-ascii { color: var(--tx-color); }

#toolbar {
  display: flex;
  gap: 8px;
  padding: 6px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  align-items: center;
  font-size: 12px;
}
#toolbar button {
  padding: 4px 12px;
  border: none;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  background: var(--surface2);
  color: var(--text);
}
#toolbar button:hover { background: var(--accent); }
#toolbar label { color: var(--text-muted); }
#toolbar input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 3px 8px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 11px;
  width: 60px;
}
#packet-count { color: var(--text-muted); margin-left: auto; font-size: 11px; }

.compat-error {
  text-align: center;
  padding: 40px;
  color: var(--accent);
  font-size: 16px;
}

/* Login modal */
#login-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#login-overlay.visible { display: flex; }
#login-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  width: 360px;
  max-width: 90vw;
}
#login-modal h2 {
  font-size: 16px;
  margin-bottom: 16px;
  color: var(--accent);
}
#login-modal label {
  display: block;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 4px;
  margin-top: 12px;
}
#login-modal input, #login-modal select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 13px;
}
#login-modal .btn-row {
  display: flex;
  gap: 8px;
  margin-top: 20px;
}
#login-modal button {
  flex: 1;
  padding: 8px 16px;
  border: none;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 13px;
  cursor: pointer;
  background: var(--surface2);
  color: var(--text);
  transition: background 0.2s;
}
#login-modal button:hover { background: var(--accent); }
#login-modal button:disabled { opacity: 0.4; cursor: default; background: var(--surface2); }
#login-modal button.primary { background: var(--accent); }
#login-modal button.primary:hover { background: #c03050; }
#login-error {
  color: var(--accent);
  font-size: 12px;
  margin-top: 10px;
  min-height: 16px;
}
#login-success {
  color: var(--rx-color);
  font-size: 12px;
  margin-top: 10px;
  min-height: 16px;
}

/* Requirements banner */
#requirements-banner {
  display: none;
  padding: 12px 20px;
  background: #2a1a00;
  border-bottom: 1px solid #4a3000;
  font-size: 12px;
  line-height: 1.6;
}
#requirements-banner.visible { display: block; }
#requirements-banner .req-title {
  color: #ffcc00;
  font-weight: bold;
  font-size: 13px;
  margin-bottom: 6px;
}
#requirements-banner .req-ok { color: var(--rx-color); }
#requirements-banner .req-fail { color: var(--accent); }
#requirements-banner .req-flag {
  color: var(--tx-color);
  user-select: all;
  cursor: pointer;
}
#requirements-banner a {
  color: var(--tx-color);
  text-decoration: underline;
}
#requirements-banner .req-dismiss {
  float: right;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 12px;
}
#requirements-banner .req-dismiss:hover { color: var(--text); }
@keyframes hint-pulse {
  0%, 100% { box-shadow: 0 0 4px rgba(233, 69, 96, 0.3); }
  50% { box-shadow: 0 0 10px rgba(233, 69, 96, 0.7); }
}
</style>
</head>
<body>

<header>
  <h1>EcoFlow BLE Debug</h1>
  <span id="status">Disconnected</span>
</header>

<div id="requirements-banner">
  <button class="req-dismiss" onclick="this.parentElement.classList.remove('visible')">[dismiss]</button>
  <div class="req-title">Browser requirements</div>
  <div id="req-checks"></div>
</div>

<div id="connection-panel">
  <input id="user-id" placeholder="User ID" style="width:280px">
  <button id="btn-login" onclick="app.showLogin()">Login</button>
  <input id="serial-number" placeholder="Serial Number (auto-detect)" style="width:200px">
  <button id="btn-scan" onclick="app.scan()">Scan &amp; Connect</button>
  <button id="btn-disconnect" onclick="app.disconnect()" disabled>Disconnect</button>
</div>

<div id="login-overlay" onclick="if(event.target===this)app.hideLogin()">
  <div id="login-modal">
    <h2>EcoFlow Cloud Login</h2>
    <label for="login-email">Email</label>
    <input id="login-email" type="email" placeholder="your@email.com">
    <label for="login-password">Password</label>
    <input id="login-password" type="password" placeholder="Password">
    <label for="login-region">Region</label>
    <select id="login-region">
      <option value="auto">Auto (Global)</option>
      <option value="eu">Europe</option>
      <option value="us">United States</option>
    </select>
    <div id="login-error"></div>
    <div id="login-success"></div>
    <div class="btn-row">
      <button onclick="app.hideLogin()">Cancel</button>
      <button class="primary" id="btn-do-login" onclick="app.doLogin()">Log in</button>
    </div>
  </div>
</div>

<div id="log-area"></div>
<div class="resize-handle-v" id="log-resize"></div>

<div id="toolbar">
  <button onclick="app.clearPackets()">Clear</button>
  <label>Filter cmd_set:</label>
  <input id="filter-cmdset" placeholder="hex" oninput="app.applyFilter()">
  <label>cmd_id:</label>
  <input id="filter-cmdid" placeholder="hex" oninput="app.applyFilter()">
  <label><input type="checkbox" id="auto-scroll" checked> Auto-scroll</label>
  <label><input type="checkbox" id="auto-reply"> Reply packets</label>
  <label>Max:</label>
  <input id="max-packets" type="number" value="100" min="10" max="10000" style="width:55px" onchange="app.applyMaxPackets()">
  <span id="packet-count">0 packets</span>
</div>

<div id="main-content">
  <div id="packet-log">
    <table>
      <thead>
        <tr>
          <th data-col="#">#</th><th data-col="Time">Time</th><th data-col="Dir">Dir</th><th data-col="Ver">Ver</th>
          <th data-col="Src">Src</th><th data-col="Dst">Dst</th><th data-col="dSrc">dSrc</th><th data-col="dDst">dDst</th>
          <th data-col="CmdSet">CmdSet</th><th data-col="CmdId">CmdId</th><th data-col="Len">Len</th><th data-col="Seq">Seq</th>
        </tr>
      </thead>
      <tbody id="packet-tbody"></tbody>
    </table>
  </div>
  <div class="resize-handle-h" id="panel-resize"></div>
  <div id="payload-detail">
    <div id="proto-bar">
      <label>Proto:</label>
      <select id="proto-file" onchange="app.onProtoFileChange()">
        <option value="">None (hex only)</option>
      </select>
      <label>Message:</label>
      <select id="proto-msg" onchange="app.onMsgTypeChange()"></select>
      <button onclick="app.showCustomProto()">Paste custom</button>
    </div>
    <div id="payload-tabs">
      <button class="active" onclick="app.switchPayloadTab('packet')">Packet</button>
      <button onclick="app.switchPayloadTab('timeline')">Timeline</button>
    </div>

    <div id="view-packet" class="active">
      <h3>Payload <button onclick="app.xorPayload()" title="XOR payload with seq[0] byte">XOR seq[0]</button> <button onclick="app.copyPayload()" title="Copy payload hex">Copy payload</button> <button onclick="app.copyRawPacket()" title="Copy full raw packet hex">Copy raw packet</button></h3>
      <div id="proto-decoded"></div>
      <pre id="hex-dump">Select a packet to view payload</pre>
    </div>

    <div id="view-timeline">
      <div id="timeline-controls">
        <button onclick="app.refreshTimeline()">Refresh</button>
        <label><input type="checkbox" id="tl-changes-only" onchange="app.refreshTimeline()"> Changes only</label>
        <label><input type="checkbox" id="tl-auto-refresh" checked> Live</label>
        <select id="tl-direction" onchange="app.refreshTimeline()">
          <option value="">All</option>
          <option value="RX">RX only</option>

<script>
'use strict';

// ============================================================================
// CRC8 - CCITT (poly=0x07, init=0x00)
// ============================================================================
const CRC8_TABLE = new Uint8Array(256);
(function() {
  for (let i = 0; i < 256; i++) {
    let crc = i;
    for (let j = 0; j < 8; j++) {
      crc = (crc & 0x80) ? ((crc << 1) ^ 0x07) & 0xFF : (crc << 1) & 0xFF;
    }
    CRC8_TABLE[i] = crc;
  }
})();

function crc8(data) {
  let crc = 0x00;
  for (let i = 0; i < data.length; i++) {
    crc = CRC8_TABLE[(crc ^ data[i]) & 0xFF];
  }
  return crc;
}

// ============================================================================
// CRC16 - ARC (poly=0x8005, init=0x0000, reflect in+out)
// ============================================================================
const CRC16_TABLE = new Uint16Array(256);
(function() {
  for (let i = 0; i < 256; i++) {
    let crc = i;
    for (let j = 0; j < 8; j++) {
      crc = (crc & 1) ? ((crc >>> 1) ^ 0xA001) : (crc >>> 1);
    }
    CRC16_TABLE[i] = crc;
  }
})();

function crc16(data) {
  let crc = 0x0000;
  for (let i = 0; i < data.length; i++) {
    crc = ((crc >>> 8) ^ CRC16_TABLE[(crc ^ data[i]) & 0xFF]) & 0xFFFF;
  }
  return crc;
}

// ============================================================================
// MD5 (RFC 1321)
// ============================================================================
function md5(input) {
  const bytes = (input instanceof Uint8Array) ? input : new TextEncoder().encode(input);

  function leftRotate(x, c) { return ((x << c) | (x >>> (32 - c))) >>> 0; }

  const s = [
    7,12,17,22, 7,12,17,22, 7,12,17,22, 7,12,17,22,
    5, 9,14,20, 5, 9,14,20, 5, 9,14,20, 5, 9,14,20,
    4,11,16,23, 4,11,16,23, 4,11,16,23, 4,11,16,23,
    6,10,15,21, 6,10,15,21, 6,10,15,21, 6,10,15,21
  ];

  const K = new Uint32Array(64);
  for (let i = 0; i < 64; i++) {
    K[i] = Math.floor(Math.abs(Math.sin(i + 1)) * 0x100000000) >>> 0;
  }

  // Pre-processing: padding
  // Total = message + 1 (0x80) + zeros + 8 (length), must be multiple of 64
  const bitLen = bytes.length * 8;
  const totalWithout = bytes.length + 1 + 8; // message + 0x80 byte + 8 byte length
  const padded = new Uint8Array(Math.ceil(totalWithout / 64) * 64);
  padded.set(bytes);
  padded[bytes.length] = 0x80;
  // Length in bits as 64-bit LE
  const dv = new DataView(padded.buffer);
  dv.setUint32(padded.length - 8, bitLen >>> 0, true);
  dv.setUint32(padded.length - 4, 0, true); // upper 32 bits (assume < 2^32 bits)

  let a0 = 0x67452301 >>> 0;
  let b0 = 0xefcdab89 >>> 0;
  let c0 = 0x98badcfe >>> 0;
  let d0 = 0x10325476 >>> 0;

  for (let offset = 0; offset < padded.length; offset += 64) {
    const M = new Uint32Array(16);
    for (let j = 0; j < 16; j++) {
      M[j] = dv.getUint32(offset + j * 4, true);
    }

    let A = a0, B = b0, C = c0, D = d0;

    for (let i = 0; i < 64; i++) {
      let F, g;
      if (i < 16) {
        F = ((B & C) | (~B & D)) >>> 0;
        g = i;
      } else if (i < 32) {
        F = ((D & B) | (~D & C)) >>> 0;
        g = (5 * i + 1) % 16;
      } else if (i < 48) {
        F = (B ^ C ^ D) >>> 0;
        g = (3 * i + 5) % 16;
      } else {
        F = (C ^ (B | ~D)) >>> 0;
        g = (7 * i) % 16;
      }

      F = (F + A + K[i] + M[g]) >>> 0;
      A = D;
      D = C;
      C = B;
      B = (B + leftRotate(F, s[i])) >>> 0;
    }

    a0 = (a0 + A) >>> 0;
    b0 = (b0 + B) >>> 0;
    c0 = (c0 + C) >>> 0;
    d0 = (d0 + D) >>> 0;
  }

  const result = new Uint8Array(16);
  const rdv = new DataView(result.buffer);
  rdv.setUint32(0, a0, true);
  rdv.setUint32(4, b0, true);
  rdv.setUint32(8, c0, true);
  rdv.setUint32(12, d0, true);
  return result;
}

function md5hex(input) {
  return Array.from(md5(input), b => b.toString(16).padStart(2, '0')).join('');
}

// ============================================================================
// AES-CBC Encryption (Web Crypto API)
// ============================================================================
class AESCrypto {
  constructor(key, iv) {
    this.keyBytes = key;
    this.ivBytes = iv;
    this._cryptoKey = null;
  }

  async _getKey() {
    if (!this._cryptoKey) {
      this._cryptoKey = await crypto.subtle.importKey(
        'raw', this.keyBytes, { name: 'AES-CBC' }, false, ['encrypt', 'decrypt']
      );
    }
    return this._cryptoKey;
  }

  async encrypt(plaintext) {
    // PKCS7 padding is handled by Web Crypto
    const key = await this._getKey();
    const ct = await crypto.subtle.encrypt({ name: 'AES-CBC', iv: this.ivBytes }, key, plaintext);
    return new Uint8Array(ct);
  }

  async decrypt(ciphertext) {
    const key = await this._getKey();
    try {
      const pt = await crypto.subtle.decrypt({ name: 'AES-CBC', iv: this.ivBytes }, key, ciphertext);
      return new Uint8Array(pt);
    } catch (e) {
      // Fallback: try without unpadding (for corrupt/partial data)
      throw new Error('AES decrypt failed: ' + e.message);
    }
  }
}

// Type1 encryption: zero-padding, no unpad on decrypt
class AESCryptoType1 {
  constructor(key, iv) {
    this.keyBytes = key;
    this.ivBytes = iv;
    this._cryptoKey = null;
  }

  async _getKey() {
    if (!this._cryptoKey) {
      this._cryptoKey = await crypto.subtle.importKey(
        'raw', this.keyBytes, { name: 'AES-CBC' }, false, ['encrypt', 'decrypt']
      );
    }
    return this._cryptoKey;
  }

  async encrypt(plaintext) {
    const padLen = ((plaintext.length + 15) >> 4) << 4;
    const padded = new Uint8Array(padLen);
    padded.set(plaintext);
    const key = await this._getKey();
    // Encrypt without Web Crypto's auto-padding: add a full block of PKCS7 padding
    // then strip it from result. Or: use raw blocks.
    // Simpler: manually pad to block size with zeros, then encrypt with PKCS7
    // and take only the first padLen bytes of output.
    // Web Crypto always adds PKCS7 padding, so we get padLen+16 bytes back.
    const ct = await crypto.subtle.encrypt({ name: 'AES-CBC', iv: this.ivBytes }, key, padded);
    return new Uint8Array(ct).slice(0, padLen);
  }

  async decrypt(ciphertext) {
    // For type1, no unpadding - raw decrypt
    // Web Crypto expects PKCS7 padded data. We need to add a padding block.
    // Actually for decryption we can just add 16 zero bytes and decrypt, then take original length.
    // Alternatively, implement AES-CBC manually... Let's use a trick:
    // Decrypt each 16-byte block manually using the Web Crypto single-block approach.
    const key = await this._getKey();
    const result = new Uint8Array(ciphertext.length);
    let prevBlock = this.ivBytes;

    for (let i = 0; i < ciphertext.length; i += 16) {
      const block = ciphertext.slice(i, i + 16);
      // Encrypt a zero block to get the raw AES, then... actually this is complex.
      // Let's just use a padded approach: append 16 bytes of 0x10 (valid PKCS7)
      const padded = new Uint8Array(ciphertext.length + 16);
      padded.set(ciphertext);
      padded.fill(16, ciphertext.length); // PKCS7 padding of full block
      try {
        const pt = await crypto.subtle.decrypt({ name: 'AES-CBC', iv: this.ivBytes }, key, padded);
        return new Uint8Array(pt);
      } catch {
        // If PKCS7 unpad fails, the last block padding might be wrong. Use ECB fallback.
        throw new Error('Type1 decrypt failed');
      }
    }
    return result;
  }
}

// ============================================================================
// KeyData
// ============================================================================
function getKeyData(pos, len) {
  return KEYDATA.slice(pos, pos + len);

// ============================================================================
// Packet
// ============================================================================
class Packet {
  static PREFIX = 0xAA;

  constructor(src, dst, cmdSet, cmdId, payload = new Uint8Array(0), dsrc = 1, ddst = 1, version = 3, seq = null, productId = 0) {
    this.src = src;
    this.dst = dst;
    this.cmdSet = cmdSet;
    this.cmdId = cmdId;
    this.payload = payload;
    this.dsrc = dsrc;
    this.ddst = ddst;
    this.version = version;
    this.seq = seq || new Uint8Array(4);
    this.productId = productId;
  }

  static fromBytes(data, xorPayload = false) {
    if (data[0] !== Packet.PREFIX) {
      return null;
    }

    const version = data[1];
    if ((version === 2 && data.length < 18) || ([3, 4].includes(version) && data.length < 20)) {
      return null;
    }

    const payloadLength = data[2] | (data[3] << 8); // LE uint16

    // CRC16 check for v2/3/4
    if ([2, 3, 4].includes(version)) {
      const expectedCrc = data[data.length - 2] | (data[data.length - 1] << 8);
      if (crc16(data.slice(0, -2)) !== expectedCrc) {
        return null;
      }
    }

    // CRC8 header check
    if (crc8(data.slice(0, 4)) !== data[4]) {
      return null;
    }

    const seq = data.slice(6, 10);
    const src = data[12];
    const dst = data[13];

    let dsrc = 0, ddst = 0, cmdSet, cmdId;
    const payloadStart = version === 2 ? 16 : 18;

    if (version === 2) {
      cmdSet = data[14];
      cmdId = data[15];
    } else {
      dsrc = data[14];
      ddst = data[15];
      cmdSet = data[16];
      cmdId = data[17];
    }

    let payload = new Uint8Array(0);
    if (payloadLength > 0) {
      payload = data.slice(payloadStart, payloadStart + payloadLength);

      // XOR payload with seq[0] if needed
      if (xorPayload && seq[0] !== 0) {
        payload = payload.map(b => b ^ seq[0]);
      }

      // Strip trailing 0xBBBB for version 0x13
      if (version === 0x13 && payload.length >= 2 &&
          payload[payload.length - 2] === 0xBB && payload[payload.length - 1] === 0xBB) {
        payload = payload.slice(0, -2);
      }
    }

    return new Packet(src, dst, cmdSet, cmdId, payload, dsrc, ddst, version, seq, 0);
  }

  toBytes() {
    const parts = [];

    // Header
    const header = new Uint8Array(4);
    header[0] = Packet.PREFIX;
    header[1] = this.version;
    header[2] = this.payload.length & 0xFF;
    header[3] = (this.payload.length >> 8) & 0xFF;
    parts.push(header);

    // Header CRC
    parts.push(new Uint8Array([crc8(header)]));

    // Product byte + seq + reserved
    const productByte = this.productId >= 0 ? 0x0D : 0x0C;
    parts.push(new Uint8Array([productByte]));
    parts.push(this.seq);
    parts.push(new Uint8Array([0x00, 0x00]));

    // Addresses
    parts.push(new Uint8Array([this.src, this.dst]));
    if (this.version >= 0x03) {
      parts.push(new Uint8Array([this.dsrc, this.ddst]));
    }

    // Command
    parts.push(new Uint8Array([this.cmdSet, this.cmdId]));

    // Payload
    parts.push(this.payload);

    // Concatenate all parts
    const totalLen = parts.reduce((s, p) => s + p.length, 0);
    const data = new Uint8Array(totalLen + 2); // +2 for CRC16
    let offset = 0;
    for (const p of parts) {
      data.set(p, offset);
      offset += p.length;
    }

    // CRC16
    const c = crc16(data.slice(0, offset));
    data[offset] = c & 0xFF;
    data[offset + 1] = (c >> 8) & 0xFF;

    return data;
  }

  toString() {
    return `Packet(src=0x${hex(this.src)}, dst=0x${hex(this.dst)}, cmd_set=0x${hex(this.cmdSet)}, cmd_id=0x${hex(this.cmdId)}, dsrc=0x${hex(this.dsrc)}, ddst=0x${hex(this.ddst)}, ver=0x${hex(this.version)}, payload=${this.payload.length}B)`;
  }
}

function hex(v) { return v.toString(16).padStart(2, '0').toUpperCase(); }
function hexBytes(arr) { return Array.from(arr, b => hex(b)).join(' '); }

// ============================================================================
// EncPacket
// ============================================================================
const ENCPACKET_PREFIX = new Uint8Array([0x5A, 0x5A]);

function encPacketEncode(frameType, payload, encKey = null, iv = null) {
  let encPayload = payload;
  // We handle encryption externally, just build the frame
  const header = new Uint8Array(6);
  header[0] = 0x5A;
  header[1] = 0x5A;
  header[2] = (frameType << 4) & 0xFF;
  header[3] = 0x01;
  const plen = encPayload.length + 2;
  header[4] = plen & 0xFF;
  header[5] = (plen >> 8) & 0xFF;

  const frame = new Uint8Array(6 + encPayload.length + 2);
  frame.set(header);
  frame.set(encPayload, 6);
  const c = crc16(frame.slice(0, 6 + encPayload.length));
  frame[6 + encPayload.length] = c & 0xFF;
  frame[6 + encPayload.length + 1] = (c >> 8) & 0xFF;
  return frame;
}

// ============================================================================
// SimplePacketAssembler (unencrypted command frames)
// ============================================================================
class SimplePacketAssembler {
  constructor() {
    this.buffer = new Uint8Array(0);
  }

  static encode(payload) {
    return encPacketEncode(0x00, payload);
  }

  parse(data) {
    if (this.buffer.length > 0) {
      const combined = new Uint8Array(this.buffer.length + data.length);
      combined.set(this.buffer);
      combined.set(data, this.buffer.length);
      data = combined;
      this.buffer = new Uint8Array(0);
    }

    let offset = 0;
    while (offset < data.length) {
      const start = findPrefix(data, 0x5A5A, offset);
      if (start < 0) return null;
      if (start > offset) offset = start;

      if (data.length - offset < 8) {
        this.buffer = data.slice(offset);
        return null;
      }

      const header = data.slice(offset, offset + 6);
      const payloadLen = header[4] | (header[5] << 8);
      const dataEnd = offset + 6 + payloadLen;

      if (dataEnd > data.length) {
        const nextPrefix = findPrefix(data, 0x5A5A, offset + 2);
        if (nextPrefix >= 0) {
          offset = nextPrefix;
          continue;
        }
        this.buffer = data.slice(offset);
        return null;
      }

      const payloadData = data.slice(offset + 6, dataEnd - 2);
      const payloadCrc = data[dataEnd - 2] | (data[dataEnd - 1] << 8);

      const headerAndPayload = new Uint8Array(6 + payloadData.length);
      headerAndPayload.set(header);
      headerAndPayload.set(payloadData, 6);

      if (crc16(headerAndPayload) !== payloadCrc) {
        offset += 2;
        continue;
      }

      return payloadData;
    }
    return null;
  }
}

// ============================================================================
// EncPacketAssembler (encrypted data frames)
// ============================================================================
class EncPacketAssembler {
  constructor(crypto) {
    this.crypto = crypto;
    this.buffer = new Uint8Array(0);
  }

  async reassemble(data) {
    if (this.buffer.length > 0) {
      const combined = new Uint8Array(this.buffer.length + data.length);
      combined.set(this.buffer);
      combined.set(data, this.buffer.length);
      data = combined;
      this.buffer = new Uint8Array(0);
    }

    const payloads = [];
    let offset = 0;

    while (offset < data.length) {
      const start = findPrefix(data, 0x5A5A, offset);
      if (start < 0) break;
      if (start > offset) offset = start;

      if (data.length - offset < 8) break;

      const header = data.slice(offset, offset + 6);
      const payloadLen = header[4] | (header[5] << 8);

      if (payloadLen > 10000) {
        offset += 2;
        continue;
      }

      const dataEnd = offset + 6 + payloadLen;
      if (dataEnd > data.length) {
        const nextPrefix = findPrefix(data, 0x5A5A, offset + 2);
        if (nextPrefix >= 0) {
          offset = nextPrefix;
          continue;
        }
        break;
      }

      const payloadData = data.slice(offset + 6, dataEnd - 2);
      const payloadCrc = data[dataEnd - 2] | (data[dataEnd - 1] << 8);

      const headerAndPayload = new Uint8Array(6 + payloadData.length);
      headerAndPayload.set(header);
      headerAndPayload.set(payloadData, 6);

      if (crc16(headerAndPayload) !== payloadCrc) {
        offset += 2;
        continue;
      }

      offset = dataEnd;
      try {
        const decrypted = await this.crypto.decrypt(payloadData);
        payloads.push(decrypted);
      } catch (e) {
        console.error('Decrypt failed:', e);
      }
    }

    this.buffer = data.slice(offset);
    return payloads;
  }
}

function findPrefix(data, prefix, start) {
  const hi = (prefix >> 8) & 0xFF;
  const lo = prefix & 0xFF;
  for (let i = start; i < data.length - 1; i++) {
    if (data[i] === hi && data[i + 1] === lo) return i;
  }
  return -1;
}

// ============================================================================
// ECDH (SECP160r1 via elliptic.js with custom curve definition)
// ============================================================================

// SECP160r1 is not built into elliptic.js, so we define it manually.
// elliptic.ec reads hash.hmacStrength and hash.blockSize during key generation,
// so we provide a stub hash object with the required properties.
const _stubHash = { hmacStrength: 20, blockSize: 64, outSize: 20 };
const secp160r1 = new elliptic.ec(
  new elliptic.curves.PresetCurve({
    type: 'short',
    prime: null,
    p: 'ffffffff ffffffff ffffffff ffffffff 7fffffff',
    a: 'ffffffff ffffffff ffffffff ffffffff 7ffffffc', // p - 3
    b: '1c97befc 54bd7a8b 65acf89f 81d4d4ad c565fa45',
    n: '01 00000000 00000000 0001f4c8 f927aed3 ca752257',
    hash: _stubHash,
    gRed: false,
    g: [
      '4a96b568 8ef57328 4664698968c38bb9 13cbfc82',
      '23a62855 3168947d 59dcc912 04235137 7ac5fb32'
    ]
  })
);

function getEcdhTypeSize(curveNum) {
  switch (curveNum) {
    case 1: return 52;
    case 2: return 56;
    case 3: case 4: return 64;
    default: return 40;
  }
}

// ============================================================================
// Session Key Generation
// ============================================================================
function genSessionKey(seed, srand) {
  const pos = seed[0] * 0x10 + ((seed[1] - 1) & 0xFF) * 0x100;
  const kd0 = getKeyData(pos, 8);
  const kd1 = getKeyData(pos + 8, 8);

  // Pack as 32 bytes LE: kd0(8) + kd1(8) + srand[0:8] + srand[8:16]
  const combined = new Uint8Array(32);
  combined.set(kd0, 0);
  combined.set(kd1, 8);
  combined.set(srand.slice(0, 8), 16);
  combined.set(srand.slice(8, 16), 24);

  return md5(combined);
}
