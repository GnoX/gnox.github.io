    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const region = document.getElementById('login-region').value;

    if (!email || !password) {
      document.getElementById('login-error').textContent = 'Email and password are required.';
      return;
    }

    const REGIONS = {
      auto: 'api.ecoflow.com',
      eu: 'api-e.ecoflow.com',
      us: 'api-a.ecoflow.com',
    };

    const errorEl = document.getElementById('login-error');
    const successEl = document.getElementById('login-success');
    const btn = document.getElementById('btn-do-login');

    errorEl.textContent = '';
    successEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
      const baseUrl = REGIONS[region] || REGIONS.auto;
      const resp = await fetch(`https://${baseUrl}/auth/login`, {
        method: 'POST',
        headers: {
          'Accept': 'application/json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          scene: 'IOT_APP',
          appVersion: '1.0.0',
          password: btoa(password),
          oauth: { bundleId: 'com.ef.EcoFlow' },
          email: email,
          userType: 'ECOFLOW',
        }),
      });

      if (!resp.ok) {
        throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
      }

      const result = await resp.json();
      if (result.code !== '0') {
        throw new Error(result.message || 'Login failed');
      }

      const userId = String(result.data.user.userId);
      document.getElementById('user-id').value = userId;
      localStorage.setItem('ef-ble-userId', userId);
      successEl.textContent = `Logged in. User ID: ${userId}`;
      this.log(`EcoFlow login successful. User ID: ${userId}`, 'success');

      this._updateConnectionHints();
      setTimeout(() => this.hideLogin(), 1500);
    } catch (e) {
      errorEl.textContent = e.message;
      this.log(`EcoFlow login failed: ${e.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Log in';
    }
  }

  async scan() {
    if (!navigator.bluetooth) {
      this.log('Web Bluetooth API not available. Use Chrome/Edge over HTTPS or localhost.', 'error');
      return;
    }

    try {
      this.setStatus('Scanning...', 'connecting');

      // Start a background LE scan to capture serial numbers from manufacturer data.
      // This runs concurrently with the device picker so it doesn't block.
      const snInput = document.getElementById('serial-number').value.trim();
      let scanPromise = null;
      this.log(`[Scan] requestLEScan available: ${!!navigator.bluetooth.requestLEScan}`, 'info');
      if (!snInput && navigator.bluetooth.requestLEScan) {
        scanPromise = this._preScan();
      } else if (!snInput) {
        this.log('[Scan] No requestLEScan — serial number must be entered manually', 'info');
      }

      this.log('[Scan] Opening device picker with manufacturer filter (0xB5B5)...', 'info');

      // Try with manufacturer data filter first
      let device;
      try {
        device = await navigator.bluetooth.requestDevice({
          filters: [{ manufacturerData: [{ companyIdentifier: 0xB5B5 }] }],
          optionalServices: [
            '6e400001-b5a3-f393-e0a9-e50e24dcca9e', // NUS service
            '00000001-0000-1000-8000-00805f9b34fb',  // RFCOMM service
          ]
        });
        this.log('[Scan] Device selected via manufacturer filter', 'success');
      } catch (e) {
        this.log(`[Scan] Manufacturer filter failed: ${e.name}: ${e.message}`, 'error');
        this.log('[Scan] Retrying with name prefix filter (EF-)...', 'info');
        device = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: 'EF-' }],
          optionalServices: [
            '6e400001-b5a3-f393-e0a9-e50e24dcca9e',
            '00000001-0000-1000-8000-00805f9b34fb',
          ]
        });
        this.log('[Scan] Device selected via name prefix filter', 'success');
      }

      this.device = device;
      this.log(`[Scan] Selected: name=${device.name || 'N/A'}, id=${device.id}`, 'success');

      // Stop the background scan and check results
      if (scanPromise) {
        this._stopPreScan();
        this.log(`[Scan] Pre-scan collected ${this._scannedSNs.size} SN(s): ${[...this._scannedSNs.entries()].map(([k,v]) => k+'='+v).join(', ') || 'none'}`, 'info');
      }

      // Check if pre-scan captured the SN for this device
      if (!this.serialNumber && device.name && this._scannedSNs.has(device.name)) {
        this.serialNumber = this._scannedSNs.get(device.name);
        document.getElementById('serial-number').value = this.serialNumber;
        localStorage.setItem('ef-ble-serialNumber', this.serialNumber);
        this.log(`Serial number from pre-scan: ${this.serialNumber}`, 'success');
      }

      // Resolve serial number (re-check since pre-scan may have filled it)
      const snCurrent = document.getElementById('serial-number').value.trim();
      if (snCurrent) {
        this.serialNumber = snCurrent;
      } else {
        // Try to extract SN from manufacturer data (requires experimental flags)
        const sn = await this._extractSerialNumber();
        if (sn) {
          this.serialNumber = sn;
          document.getElementById('serial-number').value = sn;
          localStorage.setItem('ef-ble-serialNumber', sn);
          this.log(`Serial number from manufacturer data: ${sn}`, 'success');
        } else if (!this.serialNumber) {
          this.log('Serial number required. Find it in: EcoFlow app → Device → Settings, or on the device label (16 characters, e.g. R39Rxxxxxxxxxxxx).', 'error');
          this.setStatus('Need Serial Number', 'error');
          document.getElementById('serial-number').focus();
          return;
        }
      }

      device.addEventListener('gattserverdisconnected', () => {
        this.log('Device disconnected', 'error');
        this.setStatus('Disconnected', '');
        document.getElementById('btn-scan').disabled = false;
        document.getElementById('btn-disconnect').disabled = true;
      });

      await this.connect();
    } catch (e) {
      this.log(`Scan failed: ${e.message}`, 'error');
      this.setStatus('Error', 'error');
    }
  }

  async connect() {
    try {
      this.setStatus('Connecting...', 'connecting');
      document.getElementById('btn-scan').disabled = true;

      this.log('Connecting to GATT server...', 'info');
      this.server = await this.device.gatt.connect();

      // Find characteristics
      await this._findCharacteristics();

      // Serial number was already resolved in scan() before connecting

      this.log('Starting ECDH key exchange...', 'info');
      await this._ecdhKeyExchange();

    } catch (e) {
      this.log(`Connection failed: ${e.message}`, 'error');
      this.setStatus('Error', 'error');
      document.getElementById('btn-scan').disabled = false;
      console.error(e);
    }
  }

  async _preScan() {
    // Use requestLEScan() to capture manufacturer data from nearby EcoFlow devices.
    // Runs concurrently with the device picker dialog. Does NOT await — just starts
    // collecting and _stopPreScan() ends it.
    this.log('[PreScan] requestLEScan available: ' + !!navigator.bluetooth.requestLEScan, 'info');
    try {
      this._preScanObj = await navigator.bluetooth.requestLEScan({
        filters: [{ manufacturerData: [{ companyIdentifier: 0xB5B5 }] }],
      });
      this.log('[PreScan] LE scan started, listening for advertisements...', 'info');

      this._preScanHandler = (event) => {
        this.log(`[PreScan] Advertisement: name=${event.device.name}, rssi=${event.rssi}`, 'info');
        if (event.manufacturerData) {
          for (const [companyId, dataView] of event.manufacturerData) {
            const bytes = new Uint8Array(dataView.buffer, dataView.byteOffset, dataView.byteLength);
            this.log(`[PreScan] mfr 0x${companyId.toString(16)} (${bytes.length}B): ${hexBytes(bytes)}`, 'info');
          }
        }
        const sn = this._parseSNFromManufacturerData(event.manufacturerData);
        if (sn && event.device.name) {
          this._scannedSNs.set(event.device.name, sn);
          this.log(`[PreScan] Mapped: ${event.device.name} → SN: ${sn}`, 'success');
        }
      };
      navigator.bluetooth.addEventListener('advertisementreceived', this._preScanHandler);
    } catch (e) {
      this.log(`[PreScan] Failed: ${e.name}: ${e.message}`, 'error');
    }
  }

  _stopPreScan() {
    try {
      if (this._preScanObj) {
        this._preScanObj.stop();
        this._preScanObj = null;
      }
      if (this._preScanHandler) {
        navigator.bluetooth.removeEventListener('advertisementreceived', this._preScanHandler);
        this._preScanHandler = null;
      }
    } catch {}
  }

  async _extractSerialNumber() {
    // The real serial number is 16 ASCII bytes at offset 1-17 in manufacturer data
    // (company identifier 0xB5B5).
    //
    // Strategy 1: watchAdvertisements on the selected device
    // Strategy 2: requestLEScan (general BLE scan that exposes adv data)
    // Both require chrome://flags/#enable-experimental-web-platform-features

    // Try watchAdvertisements first (watches the specific selected device)
    if (this.device.watchAdvertisements) {
      const sn = await this._watchForSN();
      if (sn) return sn;
    }

    return null;
  }

  async _watchForSN() {
    return new Promise((resolve) => {
      const timeout = setTimeout(() => {
        this.log('[SN] watchAdvertisements timed out (10s) — no advertisement received', 'info');
        try { this.device.unwatchAdvertisements(); } catch {}
        resolve(null);
      }, 10000);

      this.device.addEventListener('advertisementreceived', (event) => {
        clearTimeout(timeout);
        this.log(`[SN] Advertisement received from ${event.device.name || 'unknown'}`, 'info');

        // Log all available advertisement data
        if (event.manufacturerData) {
          this.log(`[SN] manufacturerData keys: [${[...event.manufacturerData.keys()].map(k => '0x' + k.toString(16)).join(', ')}]`, 'info');
          for (const [companyId, dataView] of event.manufacturerData) {
            const bytes = new Uint8Array(dataView.buffer, dataView.byteOffset, dataView.byteLength);
            this.log(`[SN] companyId=0x${companyId.toString(16)}, data (${bytes.length}B): ${hexBytes(bytes)}`, 'info');
          }
        } else {
          this.log('[SN] No manufacturerData in advertisement', 'info');
        }

        if (event.serviceData) {
          this.log(`[SN] serviceData keys: [${[...event.serviceData.keys()].join(', ')}]`, 'info');
        }

        this.log(`[SN] rssi=${event.rssi}, txPower=${event.txPower}, name=${event.name}`, 'info');

        try { this.device.unwatchAdvertisements(); } catch {}
        const sn = this._parseSNFromManufacturerData(event.manufacturerData);
        this.log(`[SN] Parsed SN: ${sn || 'null'}`, sn ? 'success' : 'error');
        resolve(sn);
      }, { once: true });

      this.log(`[SN] Calling watchAdvertisements() on device: ${this.device.name}...`, 'info');
      this.device.watchAdvertisements().then(() => {
        this.log('[SN] watchAdvertisements() started OK', 'info');
      }).catch((e) => {
        this.log(`[SN] watchAdvertisements() failed: ${e.message}`, 'error');
        clearTimeout(timeout);
        resolve(null);
      });
    });
  }

  _parseSNFromManufacturerData(mfData) {
    if (mfData && mfData.has(0xB5B5)) {
      const data = new Uint8Array(mfData.get(0xB5B5).buffer);
      if (data.length >= 17) {
        return new TextDecoder().decode(data.slice(1, 17)).replace(/\0+$/, '');
      }
    }
    return null;
  }

  async _findCharacteristics() {
    const NUS_WRITE = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
    const NUS_NOTIFY = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
    const RFCOMM_WRITE = '00000002-0000-1000-8000-00805f9b34fb';
    const RFCOMM_NOTIFY = '00000003-0000-1000-8000-00805f9b34fb';

    const services = await this.server.getPrimaryServices();
    this.log(`Found ${services.length} service(s)`, 'info');

    for (const service of services) {
      try {
        const chars = await service.getCharacteristics();
        for (const c of chars) {
          if (c.uuid === NUS_WRITE || c.uuid === RFCOMM_WRITE) {
            this.writeChar = c;
            this.log(`Found write characteristic: ${c.uuid}`, 'info');
          }
          if (c.uuid === NUS_NOTIFY || c.uuid === RFCOMM_NOTIFY) {
            this.notifyChar = c;
            this.log(`Found notify characteristic: ${c.uuid}`, 'info');
          }
        }
      } catch (e) {
        // Skip services we can't read
      }
    }

    if (!this.writeChar || !this.notifyChar) {
      throw new Error('Could not find BLE write/notify characteristics');
    }
  }

  async _writeData(data) {
    const MAX_MTU = 512;
    for (let i = 0; i < data.length; i += MAX_MTU) {
      const chunk = data.slice(i, Math.min(i + MAX_MTU, data.length));
      await this.writeChar.writeValueWithResponse(chunk);
    }
  }

  async _writeDataNoResponse(data) {
    const MAX_MTU = 512;
    for (let i = 0; i < data.length; i += MAX_MTU) {
      const chunk = data.slice(i, Math.min(i + MAX_MTU, data.length));
      await this.writeChar.writeValueWithoutResponse(chunk);
    }
  }

  _waitForNotify(timeout = 10000) {
    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => {
        reject(new Error('Notification timeout'));
      }, timeout);

      this._resolveNotify = (data) => {
        clearTimeout(timer);
        resolve(data);
      };
    });
  }

  _onNotifyRaw(event) {
    const data = new Uint8Array(event.target.value.buffer);
    if (this._resolveNotify) {
      const resolve = this._resolveNotify;
      this._resolveNotify = null;
      resolve(data);
    }
  }

  async _ecdhKeyExchange() {
    // Generate SECP160r1 key pair — use random bytes directly since
    // elliptic's genKeyPair() needs a real hash for HMAC-DRBG which
    // our stub doesn't provide
    const privBytes = new Uint8Array(20);
    crypto.getRandomValues(privBytes);
    const keyPair = secp160r1.keyFromPrivate(privBytes);

    // Get raw public key bytes (X || Y, no 0x04 prefix)
    const pubX = keyPair.getPublic().getX().toArrayLike(Uint8Array, 'be', 20);
    const pubY = keyPair.getPublic().getY().toArrayLike(Uint8Array, 'be', 20);
    const pubKeyBytes = new Uint8Array(40);
    pubKeyBytes.set(pubX, 0);
    pubKeyBytes.set(pubY, 20);

    // Build payload: 0x01 0x00 + public key
    const payload = new Uint8Array(2 + pubKeyBytes.length);
    payload[0] = 0x01;
    payload[1] = 0x00;
    payload.set(pubKeyBytes, 2);

    const frame = SimplePacketAssembler.encode(payload);

    // Set up notification listener
    this._notifyHandler = this._onNotifyRaw.bind(this);
    await this.notifyChar.startNotifications();
    this.notifyChar.addEventListener('characteristicvaluechanged', this._notifyHandler);

    // Send and wait for response
    this.log(`[ECDH] TX frame (${frame.length}B): ${hexBytes(frame)}`, 'info');
    const notifyPromise = this._waitForNotify();
    await this._writeData(frame);
    this.log('[ECDH] Sent public key, waiting for device response...', 'info');

    const response = await notifyPromise;
    this.log(`[ECDH] RX raw (${response.length}B): ${hexBytes(response)}`, 'info');

    const parsed = this.simpleAssembler.parse(response);
    this.log(`[ECDH] Parsed payload (${parsed ? parsed.length + 'B' : 'null'}): ${parsed ? hexBytes(parsed) : 'null'}`, 'info');

    if (!parsed || parsed.length < 3) {
      throw new Error('Invalid ECDH response: ' + (parsed ? hexBytes(parsed) : 'null'));
    }

    // Parse device public key
    const ecdhType = parsed[2];
    const ecdhTypeSize = getEcdhTypeSize(ecdhType);
    const devPubKeyBytes = parsed.slice(3, 3 + ecdhTypeSize);
    this.log(`[ECDH] Device pubkey: type=${ecdhType}, size=${ecdhTypeSize}, bytes=${hexBytes(devPubKeyBytes)}`, 'success');

    // Parse the device public key
    const coordSize = ecdhTypeSize / 2;
    const devPubKey = secp160r1.keyFromPublic({
      x: Array.from(devPubKeyBytes.slice(0, coordSize)).map(b => hex(b).toLowerCase()).join(''),
      y: Array.from(devPubKeyBytes.slice(coordSize)).map(b => hex(b).toLowerCase()).join('')
    });

    // Derive shared secret
    const sharedPoint = keyPair.derive(devPubKey.getPublic());
    const sharedBytes = sharedPoint.toArrayLike(Uint8Array, 'be', coordSize);
    this.log(`[ECDH] Shared secret (${sharedBytes.length}B): ${hexBytes(sharedBytes)}`, 'info');

    // Shared key = first 16 bytes, IV = MD5(full shared secret)
    const sharedKey = sharedBytes.slice(0, 16);
    const iv = md5(sharedBytes);
    this.log(`[ECDH] AES key: ${hexBytes(sharedKey)}`, 'info');
    this.log(`[ECDH] AES IV:  ${hexBytes(iv)}`, 'info');

    this.crypto = new AESCrypto(sharedKey, iv);
    this.log('[ECDH] Key exchange complete', 'success');

    // Continue to get key info
    await this._getKeyInfo();
  }

  async _getKeyInfo() {
    this.log('[KeyInfo] Requesting session key...', 'info');

    const frame = SimplePacketAssembler.encode(new Uint8Array([0x02]));
    this.log(`[KeyInfo] TX frame (${frame.length}B): ${hexBytes(frame)}`, 'info');
    const notifyPromise = this._waitForNotify();
    await this._writeData(frame);

    const response = await notifyPromise;
    this.log(`[KeyInfo] RX raw (${response.length}B): ${hexBytes(response)}`, 'info');

    const parsed = this.simpleAssembler.parse(response);
    this.log(`[KeyInfo] Parsed payload (${parsed ? parsed.length + 'B' : 'null'}): ${parsed ? hexBytes(parsed) : 'null'}`, 'info');

    if (!parsed || parsed[0] !== 0x02) {
      throw new Error('Invalid KeyInfo response: ' + (parsed ? hexBytes(parsed) : 'null'));
    }

    // Decrypt the encrypted portion (skip first byte which is the type 0x02)
    const encrypted = parsed.slice(1);
    this.log(`[KeyInfo] Encrypted data (${encrypted.length}B): ${hexBytes(encrypted)}`, 'info');

    const decrypted = await this.crypto.decrypt(encrypted);
    this.log(`[KeyInfo] Decrypted data (${decrypted.length}B): ${hexBytes(decrypted)}`, 'info');

    // Parse: srand (first 16 bytes) + seed (last 2 bytes)
    const srand = decrypted.slice(0, 16);
    const seed = decrypted.slice(16, 18);
    this.log(`[KeyInfo] srand: ${hexBytes(srand)}`, 'info');
    this.log(`[KeyInfo] seed: ${hexBytes(seed)}`, 'info');

    // Generate session key
    const sessionKey = genSessionKey(seed, srand);
    this.log(`[KeyInfo] Session key: ${hexBytes(sessionKey)}`, 'info');

    this.crypto = new AESCrypto(sessionKey, this.crypto.ivBytes);
    this.encAssembler = new EncPacketAssembler(this.crypto);
    this.log('[KeyInfo] Session key derived', 'success');

    // Stop temporary notification handler, proceed to auth
    await this._getAuthStatus();
  }

  async _getAuthStatus() {
    this.log('[AuthStatus] Sending auth status request...', 'info');

    const packet = new Packet(0x21, this.authHeaderDst, 0x35, 0x89,
      new Uint8Array(0), 0x01, 0x01, this.packetVersion);
    this.log(`[AuthStatus] Packet: ${packet.toString()}`, 'info');
    await this._sendEncPacket(packet);

    const response = await this._waitForNotify();
    this.log(`[AuthStatus] RX raw (${response.length}B): ${hexBytes(response)}`, 'info');

    const payloads = await this.encAssembler.reassemble(response);
    this.log(`[AuthStatus] Decrypted ${payloads.length} payload(s)`, 'info');

    if (payloads.length > 0) {
      this.log(`[AuthStatus] Payload[0] (${payloads[0].length}B): ${hexBytes(payloads[0])}`, 'info');
      const pkt = Packet.fromBytes(payloads[0]);
      if (pkt) {
        this.log(`[AuthStatus] Response packet: ${pkt.toString()}`, 'info');
      } else {
        this.log(`[AuthStatus] Failed to parse inner packet`, 'error');
      }
    }

    await this._authenticate();
  }

  async _authenticate() {
    const userId = document.getElementById('user-id').value.trim();
    if (!userId) {
      this.log('Error: User ID is required for authentication', 'error');
      this.setStatus('Error: No User ID', 'error');
      return;
    }

    if (!this.serialNumber) {
      this.log('Error: Serial number is required for authentication', 'error');
      this.setStatus('Error: No Serial Number', 'error');
      return;
    }

    this.log(`[Auth] userId="${userId}", serialNumber="${this.serialNumber}"`, 'info');

    // Build auth payload: MD5(userId + serialNumber).toUpperCase() as ASCII
    const authStr = userId + this.serialNumber;
    this.log(`[Auth] MD5 input: "${authStr}" (${authStr.length} chars)`, 'info');

    const md5Hash = md5(new TextEncoder().encode(authStr));
    const md5Hex = Array.from(md5Hash, b => hex(b)).join(''); // Already uppercase from hex()
    this.log(`[Auth] MD5 hash: ${md5Hex}`, 'info');

    const authPayload = new TextEncoder().encode(md5Hex);
    this.log(`[Auth] Auth payload (${authPayload.length}B): ${hexBytes(authPayload)}`, 'info');

    const packet = new Packet(0x21, this.authHeaderDst, 0x35, 0x86,
      authPayload, 0x01, 0x01, this.packetVersion);
    this.log(`[Auth] Packet: ${packet.toString()}`, 'info');

    // Remove the temporary handler and switch to persistent listener
    this.notifyChar.removeEventListener('characteristicvaluechanged', this._notifyHandler);
    this._notifyHandler = this._onDataHandler.bind(this);
    this.notifyChar.addEventListener('characteristicvaluechanged', this._notifyHandler);

    await this._sendEncPacket(packet);
    this.addPacket(packet, 'TX');

    this.setStatus('Connected', 'connected');
    this.log('Authentication sent. Listening for data...', 'success');
    document.getElementById('btn-disconnect').disabled = false;
    this._updateConnectionHints();
  }

  async _sendEncPacket(packet) {
    const packetBytes = packet.toBytes();
    const encrypted = await this.crypto.encrypt(packetBytes);
    const frame = encPacketEncode(0x01, encrypted);
    await this._writeData(frame);
  }

  async _onDataHandler(event) {
    const data = new Uint8Array(event.target.value.buffer);
    try {
      const payloads = await this.encAssembler.reassemble(data);
      for (const payload of payloads) {
        const packet = Packet.fromBytes(payload);
        if (packet) {
          this.addPacket(packet, 'RX');

          // Check if this is an auth response
          if (packet.cmdSet === 0x35 && packet.cmdId === 0x86) {
            const AUTH_ERRORS = {
              0x00: 'Success',
              0x01: 'General error',
              0x02: 'OTA upgrade in progress',
              0x03: 'User ID incorrect length',
              0x04: 'IOT status error',
              0x05: 'User key read error',
              0x06: 'Incorrect user ID',
              0x07: 'Maximum devices reached',
            };
            const code = packet.payload.length > 0 ? packet.payload[0] : -1;
            const msg = AUTH_ERRORS[code] || `Unknown error (0x${hex(code)})`;
            if (code === 0x00) {
              this.log(`Authentication successful`, 'success');
            } else {
              this.log(`Authentication failed: ${msg}. Check your User ID and Serial Number.`, 'error');
            }
            // Never reply to auth packets
            continue;
          }

          // Reply packets if enabled (needed to get full device data)
          // Skip auth-related command set (0x35)
          if (document.getElementById('auto-reply').checked && packet.cmdSet !== 0x35) {
            await this._replyPacket(packet);
          }
        }
      }
    } catch (e) {
      console.error('Data handler error:', e);
    }
  }

  async _replyPacket(packet) {
    const reply = new Packet(
      packet.dst,  // Swap src/dst
      packet.src,
      packet.cmdSet,
      packet.cmdId,
      packet.payload,
      0x01,
      0x01,
      packet.version,
      packet.seq,
      packet.productId
    );

    try {
      await this._sendEncPacket(reply);
      this.addPacket(reply, 'TX');
    } catch (e) {
      console.error('Reply failed:', e);
    }
  }

  addPacket(packet, direction) {
    const idx = this.packetCounter++;
    const entry = {
      idx,
      time: new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3 }),
      direction,
      packet,
      rawPayload: packet.payload
    };
    this.packets.push(entry);

    // Enforce max size — remove oldest entries
    const max = parseInt(document.getElementById('max-packets').value) || 100;
    while (this.packets.length > max) {
      const removed = this.packets.shift();
      // Remove the corresponding table row
      const row = document.querySelector(`#packet-tbody tr[data-idx="${removed.idx}"]`);
      if (row) row.remove();
    }

    // Check filter
    if (!this._matchesFilter(packet)) return;

    this._addPacketRow(entry);
    document.getElementById('packet-count').textContent = `${this.packets.length} packets`;

    // Auto-refresh timeline if live mode is on and timeline tab is active
    if (document.getElementById('tl-auto-refresh')?.checked &&
        document.getElementById('view-timeline')?.classList.contains('active')) {
      this.refreshTimeline();
    }
  }

  _matchesFilter(packet) {
    const csFilter = document.getElementById('filter-cmdset').value.trim();
    const ciFilter = document.getElementById('filter-cmdid').value.trim();

    if (csFilter) {
      const val = parseInt(csFilter, 16);
      if (!isNaN(val) && packet.cmdSet !== val) return false;
    }
    if (ciFilter) {
      const val = parseInt(ciFilter, 16);
      if (!isNaN(val) && packet.cmdId !== val) return false;
    }
    return true;
  }

  _packetCellData(entry) {
    const { idx, time, direction, packet } = entry;
    const dirClass = direction === 'TX' ? 'dir-tx' : 'dir-rx';
    const seqHex = Array.from(packet.seq).map(b => hex(b)).join('');
    return {
      '#': `${idx}`,
      'Time': `${time}`,
      'Dir': `<span class="${dirClass}">${direction}</span>`,
      'Ver': `0x${hex(packet.version)}`,
      'Src': `0x${hex(packet.src)}`,
      'Dst': `0x${hex(packet.dst)}`,
      'dSrc': `0x${hex(packet.dsrc)}`,
      'dDst': `0x${hex(packet.ddst)}`,
      'CmdSet': `0x${hex(packet.cmdSet)}`,
      'CmdId': `0x${hex(packet.cmdId)}`,
      'Len': `${packet.payload.length}`,
      'Seq': `${seqHex}`,
    };
  }

  _getPacketColumnOrder() {
    return this._packetColumnOrder;
  }

  _rebuildPacketTableHeaders() {
    const headerRow = document.querySelector('#packet-log thead tr');
    headerRow.innerHTML = '';
    for (const col of this._packetColumnOrder) {
      const th = document.createElement('th');
      th.dataset.col = col;
      th.textContent = col;
      th.style.cursor = 'grab';
      headerRow.appendChild(th);
    }
    // Re-init resize handles and reorder handlers
    const table = document.querySelector('#packet-log table');
    if (window._makeColumnsResizable) window._makeColumnsResizable(table);
  }

  _addPacketRow(entry) {
    const tbody = document.getElementById('packet-tbody');
    const tr = document.createElement('tr');
    tr.dataset.idx = entry.idx;

    const cellData = this._packetCellData(entry);
    const colOrder = this._getPacketColumnOrder();

    for (const col of colOrder) {
      const td = document.createElement('td');
      td.innerHTML = cellData[col] || '';
      tr.appendChild(td);
    }

    tr.addEventListener('click', () => this._selectPacket(entry.idx));
    tbody.insertBefore(tr, tbody.firstChild);

    if (document.getElementById('auto-scroll').checked) {
      const log = document.getElementById('packet-log');
      log.scrollTop = 0;
    }
  }

  _selectPacket(idx) {
    this.selectedIdx = idx;

    // Highlight row
    document.querySelectorAll('#packet-tbody tr').forEach(tr => {
      tr.classList.toggle('selected', parseInt(tr.dataset.idx) === idx);
    });

    // Show hex dump + proto decode
    const entry = this.packets.find(p => p.idx === idx);
    if (entry) {
      document.getElementById('hex-dump').innerHTML = this._formatHexDump(entry.rawPayload);
      this.decodeSelectedPacket();
    }

    // Hint: if no proto file selected, highlight proto dropdown
    this._updateProtoHints();
  }

  _updateConnectionHints() {
    const loginBtn = document.getElementById('btn-login');
    const snInput = document.getElementById('serial-number');
    const scanBtn = document.getElementById('btn-scan');
    const userId = document.getElementById('user-id').value.trim();
    const sn = snInput.value.trim();

    loginBtn.classList.remove('hint');
    snInput.classList.remove('hint');
    scanBtn.classList.remove('hint');

    if (!userId) {
      loginBtn.classList.add('hint');
    } else if (!sn) {
      snInput.classList.add('hint');
    } else if (!this.server || !this.server.connected) {
      scanBtn.classList.add('hint');
    }
  }

  _updateProtoHints() {
    const protoFile = document.getElementById('proto-file');
    const protoMsg = document.getElementById('proto-msg');
    const timelineTab = document.querySelectorAll('#payload-tabs button')[1];

    protoFile.classList.remove('hint');
    protoMsg.classList.remove('hint');
    timelineTab.classList.remove('hint');

    if (this.selectedIdx >= 0 && !protoFile.value) {
      // Packet selected but no proto — hint the proto dropdown
      protoFile.classList.add('hint');
    } else if (protoFile.value && protoMsg.options.length > 0 && protoMsg.value === '__try_all__') {
      // Proto loaded but still on "try all" — hint the message dropdown
      protoMsg.classList.add('hint');
    } else if (protoFile.value && protoMsg.value && protoMsg.value !== '__try_all__'
        && !document.getElementById('view-timeline').classList.contains('active')) {
      // Specific message selected but timeline not open — hint the timeline tab
      timelineTab.classList.add('hint');
    }
  }

  xorPayload() {
    if (this.selectedIdx < 0) return;
    const entry = this.packets.find(p => p.idx === this.selectedIdx);
    if (!entry) return;
    const seq0 = entry.packet.seq[0];
    if (seq0 === 0) {
      this.log('seq[0] is 0x00 — XOR would have no effect', 'info');
      return;
    }
    // Toggle XOR on the displayed payload
    entry._xored = !entry._xored;
    if (entry._xored) {
      entry._displayPayload = entry.rawPayload.map(b => b ^ seq0);
      this.log(`Payload XOR'd with 0x${hex(seq0)}`, 'info');
    } else {
      entry._displayPayload = entry.rawPayload;
      this.log('Payload XOR removed (showing original)', 'info');
    }
    document.getElementById('hex-dump').innerHTML = this._formatHexDump(entry._displayPayload);
    this.decodeSelectedPacket();
  }

  _getDisplayPayload(entry) {
    return entry._displayPayload || entry.rawPayload;
  }

  copyPayload() {
    if (this.selectedIdx < 0) return;
    const entry = this.packets.find(p => p.idx === this.selectedIdx);
    if (!entry) return;
    const payload = this._getDisplayPayload(entry);
    const hexStr = Array.from(payload, b => b.toString(16).padStart(2, '0')).join('');
    navigator.clipboard.writeText(hexStr).then(() => this.log('Payload hex copied to clipboard', 'info'));
  }

  copyRawPacket() {
    if (this.selectedIdx < 0) return;
    const entry = this.packets.find(p => p.idx === this.selectedIdx);
    if (!entry) return;
    const raw = entry.packet.toBytes();
    const hex = Array.from(raw, b => b.toString(16).padStart(2, '0')).join('');
    navigator.clipboard.writeText(hex).then(() => this.log('Raw packet hex copied to clipboard', 'info'));
  }

  _formatHexDump(data) {
    if (!data || data.length === 0) return '<span class="hex-offset">Empty payload</span>';

    const lines = [];
    for (let i = 0; i < data.length; i += 16) {
      const chunk = data.slice(i, Math.min(i + 16, data.length));

      const offsetStr = `<span class="hex-offset">${i.toString(16).padStart(8, '0')}</span>`;

      const hexParts = [];
      for (let j = 0; j < 16; j++) {
        if (j < chunk.length) {
          hexParts.push(`<span class="hex-byte">${hex(chunk[j])}</span>`);
        } else {
          hexParts.push('  ');
        }
        if (j === 7) hexParts.push(' ');
      }
      const hexStr = hexParts.join(' ');

      let asciiStr = '';
      for (let j = 0; j < chunk.length; j++) {
        const c = chunk[j];
        asciiStr += (c >= 0x20 && c <= 0x7E) ? String.fromCharCode(c) : '.';
      }
      const asciiHtml = `<span class="hex-ascii">${escapeHtml(asciiStr)}</span>`;

      lines.push(`${offsetStr}  ${hexStr}  ${asciiHtml}`);
    }
    return lines.join('\n');
  }

  // ===========================================================================
  // Protobuf
  // ===========================================================================

  _initProtoSelector() {
    const select = document.getElementById('proto-file');
    if (typeof PROTO_FILES !== 'undefined') {
      for (const name of Object.keys(PROTO_FILES).sort()) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name.replace('.proto', '');
        select.appendChild(opt);
      }
    }
  }

  async onProtoFileChange() {
    const fileName = document.getElementById('proto-file').value;
    const msgSelect = document.getElementById('proto-msg');
    msgSelect.innerHTML = '';
    this._protoRoot = null;
    this._protoMessages = [];
    this._tlPinnedFields = null; // reset pins on proto change
    this._tlColumnOrder = null;
    this._tlRows = null;
    this._tlAllFields = null;
    this._tlChangedFields = null;

    if (!fileName) {
      document.getElementById('proto-decoded').textContent = '';
      return;
    }

    try {
      const content = PROTO_FILES[fileName];
      this._protoRoot = protobuf.parse(content, { keepCase: true }).root;
      this._protoMessages = this._collectMessages(this._protoRoot);

      for (const name of this._protoMessages) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        msgSelect.appendChild(opt);
      }

      // Add "Try all" option at the top
      const tryAll = document.createElement('option');
      tryAll.value = '__try_all__';
      tryAll.textContent = '(try all messages)';
      msgSelect.insertBefore(tryAll, msgSelect.firstChild);
      msgSelect.value = '__try_all__';

      this.log(`Loaded ${fileName}: ${this._protoMessages.length} message type(s)`, 'success');
      this.decodeSelectedPacket();
      this._updateProtoHints();
    } catch (e) {
      this.log(`Failed to parse ${fileName}: ${e.message}`, 'error');
    }
  }

  _collectMessages(namespace, prefix = '') {
    const messages = [];
    if (namespace.nested) {
      for (const [name, obj] of Object.entries(namespace.nested)) {
        const fullName = prefix ? prefix + '.' + name : name;
        if (obj instanceof protobuf.Type) {
          messages.push(fullName);
        }
        if (obj.nested) {
          messages.push(...this._collectMessages(obj, fullName));
        }
      }
    }
    return messages;
  }

  selectMsgType(name) {
    const select = document.getElementById('proto-msg');
    if (select.querySelector(`option[value="${name}"]`)) {
      select.value = name;
      this.onMsgTypeChange();
    }
  }

  onMsgTypeChange() {
    this._tlPinnedFields = null; // reset pins on message change
    this._tlColumnOrder = null; // reset column order on message change
    this.decodeSelectedPacket();
    this._updateProtoHints();
    if (document.getElementById('view-timeline').classList.contains('active')) {
      this.refreshTimeline();
    }
  }

  showCustomProto() {
    document.getElementById('custom-proto-overlay').classList.add('visible');
    document.getElementById('custom-proto-error').textContent = '';
  }

  loadCustomProto() {
    const text = document.getElementById('custom-proto-text').value.trim();
    if (!text) return;

    try {
      this._protoRoot = protobuf.parse(text, { keepCase: true }).root;
      this._protoMessages = this._collectMessages(this._protoRoot);

      const msgSelect = document.getElementById('proto-msg');
      msgSelect.innerHTML = '';

      const tryAll = document.createElement('option');
      tryAll.value = '__try_all__';
      tryAll.textContent = '(try all messages)';
      msgSelect.appendChild(tryAll);

      for (const name of this._protoMessages) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        msgSelect.appendChild(opt);
      }

      // Set proto-file dropdown to show custom
      const fileSelect = document.getElementById('proto-file');
      let customOpt = fileSelect.querySelector('option[value="__custom__"]');
      if (!customOpt) {
        customOpt = document.createElement('option');
        customOpt.value = '__custom__';
        customOpt.textContent = '(custom)';
        fileSelect.appendChild(customOpt);
      }
      fileSelect.value = '__custom__';

      document.getElementById('custom-proto-overlay').classList.remove('visible');
      this.log(`Loaded custom proto: ${this._protoMessages.length} message type(s)`, 'success');
      this.decodeSelectedPacket();
    } catch (e) {
      document.getElementById('custom-proto-error').textContent = e.message;
    }
  }

  decodeSelectedPacket() {
    if (this.selectedIdx < 0 || !this._protoRoot) {
      document.getElementById('proto-decoded').textContent = '';
      return;
    }

    const entry = this.packets.find(p => p.idx === this.selectedIdx);
    if (!entry || entry.rawPayload.length === 0) {
      document.getElementById('proto-decoded').textContent = '';
      return;
    }

    const msgName = document.getElementById('proto-msg').value;
    const displayPayload = this._getDisplayPayload(entry);

    // Also prepare XOR'd variant for auto-try (if not already XOR'd manually)
    const seq0 = entry.packet.seq[0];
    const xorPayload = (seq0 !== 0 && !entry._xored)
      ? displayPayload.map(b => b ^ seq0)
      : null;

    if (msgName === '__try_all__') {
      this._tryAllMessages(displayPayload, xorPayload, seq0);
    } else {
      this._decodeSingle(msgName, displayPayload, xorPayload, seq0);
    }
  }

  _tryDecode(MsgType, data) {
    try {
      const decoded = MsgType.decode(data);
      const obj = MsgType.toObject(decoded, { longs: String, enums: String, defaults: false });
      if (Object.keys(obj).length === 0) return null;
      return obj;
    } catch {
      return null;
    }
  }

  _tryAllMessages(payload, xorPayload, seq0) {
    const el = document.getElementById('proto-decoded');
    const results = [];

    for (const name of this._protoMessages) {
      const MsgType = this._protoRoot.lookupType(name);

      const obj = this._tryDecode(MsgType, payload);
      if (obj) {
        results.push({ name, obj, xored: false });
      }

      if (xorPayload) {
        const xorObj = this._tryDecode(MsgType, xorPayload);
        if (xorObj) {
          results.push({ name, obj: xorObj, xored: true });
        }
      }
    }

    if (results.length === 0) {
      el.innerHTML = '<span class="proto-err">No message types matched this payload</span>';
    } else {
      el.innerHTML = results.map(r => {
        const tag = r.xored ? ` <span class="proto-err">[XOR 0x${hex(seq0)}]</span>` : '';
        return `<span class="proto-msg-link" onclick="app.selectMsgType('${escapeHtml(r.name)}')">${escapeHtml(r.name)}</span>${tag}\n` +
          this._formatProtoObj(r.obj, 1);
      }).join('\n\n');
    }
  }

  _decodeSingle(msgName, payload, xorPayload, seq0) {
    const el = document.getElementById('proto-decoded');
    const MsgType = this._protoRoot.lookupType(msgName);
    const parts = [];

    const obj = this._tryDecode(MsgType, payload);
    if (obj) {
      parts.push(`<span class="proto-msg-link" onclick="app.selectMsgType('${escapeHtml(msgName)}')">${escapeHtml(msgName)}</span>\n` +
        this._formatProtoObj(obj, 1));
    }

    if (xorPayload) {
      const xorObj = this._tryDecode(MsgType, xorPayload);
      if (xorObj) {
        parts.push(`<span class="proto-msg-link" onclick="app.selectMsgType('${escapeHtml(msgName)}')">${escapeHtml(msgName)}</span> <span class="proto-err">[XOR 0x${hex(seq0)}]</span>\n` +
          this._formatProtoObj(xorObj, 1));
      }
    }

    if (parts.length === 0) {
      el.innerHTML = `<span class="proto-err">Decode failed for both original and XOR'd payload</span>`;
    } else {
      el.innerHTML = parts.join('\n\n');
    }
  }

  // ===========================================================================
  // Timeline view
  // ===========================================================================

  switchPayloadTab(tab) {
    document.querySelectorAll('#payload-tabs button').forEach(b => b.classList.remove('active'));
    document.getElementById('view-packet').classList.remove('active');
    document.getElementById('view-timeline').classList.remove('active');

    if (tab === 'timeline') {
      document.querySelectorAll('#payload-tabs button')[1].classList.add('active');
      document.getElementById('view-timeline').classList.add('active');
      this.refreshTimeline();
    } else {
      document.querySelectorAll('#payload-tabs button')[0].classList.add('active');
      document.getElementById('view-packet').classList.add('active');
    }
    this._updateProtoHints();
  }

  refreshTimeline() {
    const wrap = document.getElementById('timeline-wrap');
    const msgName = document.getElementById('proto-msg').value;

    if (!this._protoRoot || !msgName || msgName === '__try_all__') {
      wrap.innerHTML = '<div id="timeline-empty">Select a specific message type (not "try all") to view timeline</div>';
      return;
    }

    const MsgType = this._protoRoot.lookupType(msgName);
    const dirFilter = document.getElementById('tl-direction').value;

    // Decode all matching packets
    const rows = [];
    for (const entry of this.packets) {
      if (dirFilter && entry.direction !== dirFilter) continue;

      const payload = this._getDisplayPayload(entry);
      const seq0 = entry.packet.seq[0];

      let obj = this._tryDecode(MsgType, payload);
      let xored = false;
      if (!obj && seq0 !== 0) {
        const xorPayload = payload.map(b => b ^ seq0);
        obj = this._tryDecode(MsgType, xorPayload);
        xored = !!obj;
      }

      if (obj) {
        const fields = this._flattenObj(obj);
        // Compute field signature: sorted list of non-empty field names
        const sig = Object.keys(fields).filter(k => fields[k] !== '' && fields[k] != null).sort().join('|');
        rows.push({
          idx: entry.idx,
          time: entry.time,
          direction: entry.direction,
          xored,
          fields,
          sig,
        });
      }
    }

    // Store rows and fields for chip rendering
    this._tlRows = rows;

    // Collect all field names
    const allFields = new Set();
    for (const row of rows) {
      for (const key of Object.keys(row.fields)) allFields.add(key);
    }
    this._tlAllFields = [...allFields].sort();

    // For each row, find the previous row with the SAME field signature
    // and compute per-field changes against that (not just the previous row)
    this._tlChangedFields = new Set();
    const lastBySig = new Map(); // sig → row index
    for (let i = 0; i < rows.length; i++) {
      const row = rows[i];
      const prevIdx = lastBySig.get(row.sig);
      if (prevIdx !== undefined) {
        const prev = rows[prevIdx];
        row._prevSameShape = prev;
        for (const f of Object.keys(row.fields)) {
          if (String(row.fields[f] ?? '') !== String(prev.fields[f] ?? '')) {
            this._tlChangedFields.add(f);
          }
        }
      } else {
        row._prevSameShape = null;
      }
      lastBySig.set(row.sig, i);
    }

    // Initialize pinned fields if not set (default to changed fields, or all if few)
    if (!this._tlPinnedFields) {
      this._tlPinnedFields = new Set(
        this._tlChangedFields.size > 0 ? this._tlChangedFields : this._tlAllFields
      );
    }

    this.renderFieldChips();
    this._renderTimelineTable();
  }

  renderFieldChips() {
    const container = document.getElementById('tl-field-chips');
    if (!this._tlAllFields) { container.innerHTML = ''; return; }

    const filter = (document.getElementById('tl-field-filter').value || '').toLowerCase();
    const pinned = this._tlPinnedFields || new Set();

    container.innerHTML = this._tlAllFields
      .filter(f => !filter || f.toLowerCase().includes(filter))
      .map(f => {
        const isPinned = pinned.has(f);
        const hasChanges = this._tlChangedFields && this._tlChangedFields.has(f);
        const cls = ['tl-chip', isPinned ? 'pinned' : '', hasChanges ? 'has-changes' : ''].filter(Boolean).join(' ');
        return `<span class="${cls}" onclick="app.toggleFieldPin('${escapeHtml(f)}')" title="${escapeHtml(f)}">${escapeHtml(this._shortFieldName(f))}</span>`;
      }).join('');
  }

  toggleFieldPin(field) {
    if (!this._tlPinnedFields) this._tlPinnedFields = new Set();
    if (this._tlPinnedFields.has(field)) {
      this._tlPinnedFields.delete(field);
    } else {
      this._tlPinnedFields.add(field);
    }
    this.renderFieldChips();
    this._renderTimelineTable();
  }

  tlPinAll() {
    this._tlPinnedFields = new Set(this._tlAllFields || []);
    this.renderFieldChips();
    this._renderTimelineTable();
  }

  tlPinNone() {
    this._tlPinnedFields = new Set();
    this.renderFieldChips();
    this._renderTimelineTable();
  }

  tlPinChanged() {
    this._tlPinnedFields = new Set(this._tlChangedFields || []);
    this.renderFieldChips();
    this._renderTimelineTable();
  }

  _renderTimelineTable() {
    const wrap = document.getElementById('timeline-wrap');
    const rows = this._tlRows || [];
    const changesOnly = document.getElementById('tl-changes-only').checked;
    const pinned = this._tlPinnedFields || new Set();

    if (rows.length === 0) {
      wrap.innerHTML = '<div id="timeline-empty">No packets matched</div>';
      document.getElementById('tl-count').textContent = '0 matches';
      return;
    }

    // Display only pinned fields
    let displayFields = this._tlAllFields.filter(f => pinned.has(f));

    // If "changes only" is checked, further filter to only changed fields
    if (changesOnly) {
      displayFields = displayFields.filter(f => this._tlChangedFields.has(f));
    }

    if (displayFields.length === 0) {
      wrap.innerHTML = '<div id="timeline-empty">No fields selected — click field chips above to pin fields</div>';
      document.getElementById('tl-count').textContent = `${rows.length} matches, 0 pinned`;
      return;
    }

    // Apply user's column order if they've reordered via drag
    if (this._tlColumnOrder && this._tlColumnOrder.length > 0) {
      const reordered = [];
      for (const f of this._tlColumnOrder) {
        if (displayFields.includes(f)) reordered.push(f);
      }
      // Append any new fields not in saved order
      for (const f of displayFields) {
        if (!reordered.includes(f)) reordered.push(f);
      }
      displayFields = reordered;
    }

    let html = '<table><thead><tr><th data-field="#">#</th><th data-field="Time">Time</th><th data-field="Dir">Dir</th>';
    for (const f of displayFields) {
      html += `<th data-field="${escapeHtml(f)}" title="${escapeHtml(f)}">${escapeHtml(this._shortFieldName(f))}</th>`;
    }
    html += '</tr></thead><tbody>';

    // Newest first
    for (let i = rows.length - 1; i >= 0; i--) {
      const row = rows[i];
      const prev = row._prevSameShape;
      const dirClass = row.direction === 'TX' ? 'dir-tx' : 'dir-rx';
      const xorTag = row.xored ? ' *' : '';

      html += `<tr onclick="app.selectTimelineRow(${row.idx})" class="${this.selectedIdx === row.idx ? 'selected' : ''}" title="sig: ${escapeHtml(row.sig.slice(0, 60))}...">`;
      html += `<td>${row.idx}</td><td>${row.time}</td><td class="${dirClass}">${row.direction}${xorTag}</td>`;

      for (const f of displayFields) {
        const val = row.fields[f] ?? '';
        const prevVal = prev ? (prev.fields[f] ?? '') : val;
        const changed = prev && String(val) !== String(prevVal);
        const cls = changed ? ' class="changed"' : '';
        const fullVal = String(val ?? '');
        html += `<td${cls} title="${escapeHtml(fullVal)}">${escapeHtml(fullVal)}</td>`;
      }
      html += '</tr>';
    }

    html += '</tbody></table>';
    wrap.innerHTML = html;

    const changedCount = displayFields.filter(f => this._tlChangedFields.has(f)).length;
    document.getElementById('tl-count').textContent = `${rows.length} rows, ${displayFields.length} fields, ${changedCount} changing`;
  }

  selectTimelineRow(idx) {
    this.selectedIdx = idx;

    document.querySelectorAll('#packet-tbody tr').forEach(tr => {
      tr.classList.toggle('selected', parseInt(tr.dataset.idx) === idx);
    });

    const entry = this.packets.find(p => p.idx === idx);
    if (entry) {
      document.getElementById('hex-dump').innerHTML = this._formatHexDump(this._getDisplayPayload(entry));
      this.decodeSelectedPacket();
    }

    // Update row highlights without full re-render
    document.querySelectorAll('#timeline-wrap tbody tr').forEach(tr => {
      const rowIdx = parseInt(tr.querySelector('td')?.textContent);
      tr.classList.toggle('selected', rowIdx === idx);
    });
  }

  _flattenObj(obj, prefix = '') {
    const result = {};
    if (obj === null || obj === undefined) return result;
    if (typeof obj !== 'object') {
      result[prefix || 'value'] = obj;
      return result;
    }
    if (obj instanceof Uint8Array) {
      result[prefix || 'bytes'] = Array.from(obj, b => b.toString(16).padStart(2, '0')).join('');
      return result;
    }
    if (Array.isArray(obj)) {
      for (let i = 0; i < obj.length; i++) {
        Object.assign(result, this._flattenObj(obj[i], `${prefix}[${i}]`));
      }
      return result;
    }
    for (const [key, val] of Object.entries(obj)) {
      const path = prefix ? `${prefix}.${key}` : key;
      if (typeof val === 'object' && val !== null && !(val instanceof Uint8Array)) {
        Object.assign(result, this._flattenObj(val, path));
      } else if (val instanceof Uint8Array) {
        result[path] = Array.from(val, b => b.toString(16).padStart(2, '0')).join('');
      } else {
        result[path] = val;
      }
    }
    return result;
  }

  _shortFieldName(name) {
    // Show last 2 segments for readability
    const parts = name.split('.');
    return parts.length > 2 ? '...' + parts.slice(-2).join('.') : name;
  }

  _formatFieldValue(val) {
    if (val === null || val === undefined || val === '') return '';
    const s = String(val);
    return s.length > 20 ? s.slice(0, 17) + '...' : s;
  }

  _formatProtoObj(obj, indent) {
    if (obj === null || obj === undefined) return '<span class="proto-val">null</span>';
    if (typeof obj !== 'object') return `<span class="proto-val">${escapeHtml(String(obj))}</span>`;

    const pad = '  '.repeat(indent);
    const lines = [];

    if (Array.isArray(obj)) {
      for (let i = 0; i < obj.length; i++) {
        lines.push(`${pad}[${i}]: ${this._formatProtoObj(obj[i], indent + 1)}`);
      }
    } else {
      for (const [key, val] of Object.entries(obj)) {
        if (typeof val === 'object' && val !== null && !(val instanceof Uint8Array)) {
          lines.push(`${pad}<span class="proto-key">${escapeHtml(key)}</span>:`);
          lines.push(this._formatProtoObj(val, indent + 1));
        } else if (val instanceof Uint8Array) {
          lines.push(`${pad}<span class="proto-key">${escapeHtml(key)}</span>: <span class="proto-val">[${val.length}B] ${hexBytes(val)}</span>`);
        } else {
          lines.push(`${pad}<span class="proto-key">${escapeHtml(key)}</span>: <span class="proto-val">${escapeHtml(String(val))}</span>`);
        }
      }
    }
    return lines.join('\n');
  }

  applyMaxPackets() {
    const max = parseInt(document.getElementById('max-packets').value) || 100;
    while (this.packets.length > max) {
      const removed = this.packets.shift();
      const row = document.querySelector(`#packet-tbody tr[data-idx="${removed.idx}"]`);
      if (row) row.remove();
    }
    document.getElementById('packet-count').textContent = `${this.packets.length} packets`;
  }

  clearPackets() {
    this.packets = [];
    this.packetCounter = 0;
    this.selectedIdx = -1;
    document.getElementById('packet-tbody').innerHTML = '';
    document.getElementById('hex-dump').textContent = 'Select a packet to view payload';
    document.getElementById('packet-count').textContent = '0 packets';
  }

  applyFilter() {
    this._rebuildPacketTableHeaders();
    const tbody = document.getElementById('packet-tbody');
    tbody.innerHTML = '';
    for (const entry of this.packets) {
      if (this._matchesFilter(entry.packet)) {
        this._addPacketRow(entry);
      }
    }
  }

  async disconnect() {
    if (this.notifyChar && this._notifyHandler) {
      try {
        await this.notifyChar.stopNotifications();
        this.notifyChar.removeEventListener('characteristicvaluechanged', this._notifyHandler);
      } catch (e) { /* ignore */ }
    }
    if (this.server && this.server.connected) {
      this.server.disconnect();
    }
    this.setStatus('Disconnected', '');
    this.log('Disconnected', 'info');
    document.getElementById('btn-scan').disabled = false;
    document.getElementById('btn-disconnect').disabled = true;
  }
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Check browser requirements on load
(function checkRequirements() {
  const checks = [];
  let hasIssue = false;

  // 1. Secure context (HTTPS or localhost)
  const isSecure = window.isSecureContext;
  checks.push({
    ok: isSecure,
    text: 'Secure context (HTTPS / localhost)',
    fix: isSecure ? null : 'Serve this page over HTTPS or access via localhost'
  });

  // 2. Web Bluetooth API
  const hasBT = !!navigator.bluetooth;
  checks.push({
    ok: hasBT,
    text: 'Web Bluetooth API',
    fix: hasBT ? null :
      'Enable: <span class="req-flag">chrome://flags/#enable-web-bluetooth</span> → Enabled → Relaunch'
  });

  // 3. watchAdvertisements (needed for serial number auto-detect)
  const hasWatch = hasBT && !!BluetoothDevice.prototype.watchAdvertisements;
  checks.push({
    ok: hasWatch,
    text: 'watchAdvertisements (serial number auto-detect)',
    fix: hasWatch ? null :
      'Enable: <span class="req-flag">chrome://flags/#enable-experimental-web-platform-features</span> → Enabled → Relaunch<br>' +
      'Without this you must enter the serial number manually (16 chars, from EcoFlow app or device label)'
  });

  // 4. Web Crypto API
  const hasCrypto = !!(window.crypto && window.crypto.subtle);
  checks.push({
    ok: hasCrypto,
    text: 'Web Crypto API (AES encryption)',
    fix: hasCrypto ? null : 'Requires a modern browser with crypto.subtle support'
  });

  hasIssue = checks.some(c => !c.ok);

  const container = document.getElementById('req-checks');
  container.innerHTML = checks.map(c => {
    const icon = c.ok ? '<span class="req-ok">✓</span>' : '<span class="req-fail">✗</span>';
    const fix = c.fix ? `<br>&nbsp;&nbsp;→ ${c.fix}` : '';
    return `<div>${icon} ${c.text}${fix}</div>`;
  }).join('');

  if (hasIssue) {
    document.getElementById('requirements-banner').classList.add('visible');
  }
})();

// Resize handles
(function initResizeHandles() {
  function makeDraggable(handleEl, onDrag, direction) {
    let startPos, startSize;

    handleEl.addEventListener('mousedown', (e) => {
      e.preventDefault();
      handleEl.classList.add('dragging');
      startPos = direction === 'h' ? e.clientX : e.clientY;
      startSize = null; // set in first move

      const onMouseMove = (e) => {
        const currentPos = direction === 'h' ? e.clientX : e.clientY;
        onDrag(currentPos - startPos, startPos, e);
      };

      const onMouseUp = () => {
        handleEl.classList.remove('dragging');
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      };

      document.body.style.cursor = direction === 'h' ? 'col-resize' : 'row-resize';
      document.body.style.userSelect = 'none';
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });
  }

  // Horizontal: resize payload-detail panel width
  const panelHandle = document.getElementById('panel-resize');
  const payloadDetail = document.getElementById('payload-detail');
  let panelStartWidth;

  panelHandle.addEventListener('mousedown', () => {
    panelStartWidth = payloadDetail.offsetWidth;
  });

  makeDraggable(panelHandle, (delta) => {
    // Dragging left = bigger panel (negative delta = wider)
    const newWidth = Math.max(0, panelStartWidth - delta);
    payloadDetail.style.width = newWidth + 'px';
  }, 'h');

  // Vertical: resize log area height
  const logHandle = document.getElementById('log-resize');
  const logArea = document.getElementById('log-area');
  let logStartHeight;

  logHandle.addEventListener('mousedown', () => {
    logStartHeight = logArea.offsetHeight;
  });

  makeDraggable(logHandle, (delta) => {
    const newHeight = Math.max(0, logStartHeight + delta);
    logArea.style.height = newHeight + 'px';
  }, 'v');

  // Vertical: resize field bar height
  const fieldBarHandle = document.getElementById('field-bar-resize');
  const fieldBar = document.getElementById('tl-field-bar');
  let fieldBarStartHeight;

  fieldBarHandle.addEventListener('mousedown', () => {
    fieldBarStartHeight = fieldBar.offsetHeight;
  });

  makeDraggable(fieldBarHandle, (delta) => {
    const newHeight = Math.max(0, fieldBarStartHeight + delta);
    fieldBar.style.height = newHeight + 'px';
  }, 'v');
})();

// Column resize for all tables
(function initColumnResize() {
  function lockTableLayout(table) {
    // Snapshot current auto-sized widths and switch to fixed layout
    if (table._layoutLocked) return;
    const ths = table.querySelectorAll('thead th');
    ths.forEach(th => {
      th.style.width = th.offsetWidth + 'px';
    });
    table.style.tableLayout = 'fixed';
    table.style.width = table.offsetWidth + 'px';
    table.style.minWidth = '0';
    table._layoutLocked = true;
  }

  function makeColumnsResizable(table) {
    const ths = table.querySelectorAll('thead th');
    if (ths.length === 0) return;

    // Add resize handles and store original column indices
    ths.forEach((th, i) => {
      if (th._colIdx === undefined) th._colIdx = i;
      if (!th.querySelector('.col-resize')) {
        const handle = document.createElement('span');
        handle.className = 'col-resize';
        th.appendChild(handle);
      }
    });

    table.querySelectorAll('.col-resize').forEach(handle => {
      let startX, startWidth, th;

      handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        th = handle.parentElement;
        lockTableLayout(th.closest('table'));
        startX = e.clientX;
        startWidth = th.offsetWidth;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';

        const onMouseMove = (e) => {
          const newWidth = Math.max(30, startWidth + (e.clientX - startX));
          th.style.width = newWidth + 'px';
        };

        const onMouseUp = () => {
          handle.classList.remove('dragging');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
        };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      });

      // Double-click to auto-fit column width
      handle.addEventListener('dblclick', (e) => {
        e.preventDefault();
        e.stopPropagation();
        th = handle.parentElement;
        lockTableLayout(th.closest('table'));
        const colIdx = Array.from(th.parentElement.children).indexOf(th);
        const rows = table.querySelectorAll('tbody tr');

        // Measure max content width across all cells in this column
        const span = document.createElement('span');
        span.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;font:inherit;padding:inherit;';
        document.body.appendChild(span);

        // Measure header text
        span.style.font = getComputedStyle(th).font;
        span.textContent = th.textContent.trim();
        let maxWidth = span.offsetWidth + 20; // padding

        // Measure each body cell
        rows.forEach(tr => {
          const td = tr.children[colIdx];
          if (td) {
            span.style.font = getComputedStyle(td).font;
            span.textContent = td.textContent.trim();
            maxWidth = Math.max(maxWidth, span.offsetWidth + 20);
          }
        });

        document.body.removeChild(span);
        th.style.width = Math.max(30, maxWidth) + 'px';
      });
    });

    // Also make columns reorderable
    makeColumnsReorderable(table);
  }

  // Standalone reorder function that also reorders body cells
  function makeColumnsReorderable(table) {
    const headerRow = table.querySelector('thead tr');
    if (!headerRow) return;

    Array.from(headerRow.children).forEach(th => {
      if (th._dragReorderInit) return;
      th._dragReorderInit = true;

      th.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('col-resize')) return;

        const startX = e.clientX;
        let dragging = false;
        const dragColKey = th.dataset.field || th.dataset.col;
        let dropTarget = null;

        const onMouseMove = (ev) => {
          if (!dragging && Math.abs(ev.clientX - startX) < 8) return;

          if (!dragging) {
            dragging = true;
            // Create a floating clone for drag visual
            const rect = th.getBoundingClientRect();
            const ghost = th.cloneNode(true);
            ghost.id = '_drag-ghost';
            ghost.style.cssText = `
              position: fixed; top: ${rect.top}px; left: ${rect.left}px;
              width: ${rect.width}px; height: ${rect.height}px;
              background: var(--accent); color: var(--text); opacity: 0.85;
              z-index: 9999; pointer-events: none; font: ${getComputedStyle(th).font};
              padding: ${getComputedStyle(th).padding}; border-radius: 4px;
              display: flex; align-items: center;
            `;
            document.body.appendChild(ghost);
            th.style.opacity = '0.3';
            document.body.style.cursor = 'grabbing';
            document.body.style.userSelect = 'none';
          }

          // Move ghost with cursor
          const ghost = document.getElementById('_drag-ghost');
          if (ghost) ghost.style.left = (ev.clientX - ghost.offsetWidth / 2) + 'px';

          // Find nearest drop target header
          const currentHeaders = Array.from(headerRow.children);
          currentHeaders.forEach(h => { h.style.borderLeft = ''; h.style.borderRight = ''; });

          let bestDist = Infinity;
          let bestHeader = null;
          let bestBefore = true;

          for (const h of currentHeaders) {
            if (h === th) continue;
            const rect = h.getBoundingClientRect();
            const midX = rect.left + rect.width / 2;
            const dist = Math.abs(ev.clientX - midX);
            if (dist < bestDist) {
              bestDist = dist;
              bestHeader = h;
              bestBefore = ev.clientX < midX;
            }
          }

          if (bestHeader) {
            if (bestBefore) {
              bestHeader.style.borderLeft = '3px solid var(--accent)';
            } else {
              bestHeader.style.borderRight = '3px solid var(--accent)';
            }
            dropTarget = { key: bestHeader.dataset.field || bestHeader.dataset.col, before: bestBefore };
          }
        };

        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);

          // Clear visual feedback
          Array.from(headerRow.children).forEach(h => {
            h.style.borderLeft = '';
            h.style.borderRight = '';
          });

          const ghost = document.getElementById('_drag-ghost');
          if (ghost) ghost.remove();
          th.style.opacity = '';
          document.body.style.cursor = '';
          document.body.style.userSelect = '';

          console.log('[ColDrag] dragging:', dragging, 'dropTarget:', dropTarget, 'dragColKey:', dragColKey);

          if (!dragging || !dropTarget || !window.app) {
            console.log('[ColDrag] Aborted: dragging=' + dragging + ' dropTarget=' + dropTarget + ' app=' + !!window.app);
            return;
          }

          if (dropTarget.key === dragColKey) {
            console.log('[ColDrag] Dropped on self, no change');
            return;
          }

          const isTimeline = !!table.closest('#timeline-wrap');

          // Build new order by moving dragColKey to dropTarget position
          let order;
          if (isTimeline) {
            const allCols = Array.from(headerRow.children).map(h => h.dataset.field || h.dataset.col);
            order = allCols.slice();
          } else {
            order = app._packetColumnOrder.slice();
          }

          console.log('[ColDrag] Order before:', order.join(', '));
          console.log('[ColDrag] Moving:', dragColKey, 'to', dropTarget.before ? 'before' : 'after', dropTarget.key);

          // Remove dragged column from current position
          const fromIdx = order.indexOf(dragColKey);
          if (fromIdx < 0) {
            console.log('[ColDrag] dragColKey not found in order!');
            return;
          }
          order.splice(fromIdx, 1);

          // Insert at new position
          let toIdx = order.indexOf(dropTarget.key);
          if (toIdx < 0) {
            console.log('[ColDrag] dropTarget.key not found in order!');
            return;
          }
          if (!dropTarget.before) toIdx += 1;
          order.splice(toIdx, 0, dragColKey);

          console.log('[ColDrag] Order after:', order.join(', '));

          // Apply
          if (isTimeline) {
            app._tlColumnOrder = order.filter(f => f !== '#' && f !== 'Time' && f !== 'Dir');
            app._renderTimelineTable();
          } else {
            app._packetColumnOrder = order;
            console.log('[ColDrag] Calling applyFilter with new order:', app._packetColumnOrder.join(', '));
            app.applyFilter();
          }
        };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      });
    });
  }

  // Init packet table columns
  const packetTable = document.querySelector('#packet-log table');
  if (packetTable) {
    // Wait for first render to get proper widths
    requestAnimationFrame(() => makeColumnsResizable(packetTable));
  }

  // For dynamically generated tables (timeline), observe and init
  const observer = new MutationObserver(() => {
    const tlTable = document.querySelector('#timeline-wrap table');
    if (tlTable && !tlTable._colResizeInit) {
      tlTable._colResizeInit = true;
      makeColumnsResizable(tlTable);
    }
  });
  const tlWrap = document.getElementById('timeline-wrap');
  if (tlWrap) observer.observe(tlWrap, { childList: true, subtree: true });

  // Expose for manual re-init
  window._makeColumnsResizable = makeColumnsResizable;
})();
</script>
